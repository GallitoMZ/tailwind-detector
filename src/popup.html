<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div class="app" id="app" data-state="loading">
        <header class="header">
            <div class="brand">
                <img src="icons/icon-activo-48.png" alt="" class="brand__logo" />
                <span class="brand__name">Tailwind Detector</span>
            </div>
            <button id="themeToggle" class="icon-btn" data-i18n-title="changeTheme">
                <svg class="icon icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41">
                    </path>
                </svg>
                <svg class="icon icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <main class="hero">
            <div class="orb" id="orb">
                <div class="orb__glow"></div>
                <div class="orb__ring"></div>

                <svg class="orb__icon orb__icon--check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 12.5l4.5 4.5L19 7.5" />
                </svg>

                <svg class="orb__icon orb__icon--search" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
                </svg>

                <svg class="orb__icon orb__icon--shield" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"></path>
                </svg>

                <div class="orb__spinner"></div>
            </div>

            <div class="status">
                <div class="status__header">
                    <h1 class="status__title" id="statusTitle" data-i18n="loading"></h1>
                    <span class="status__pill" id="versionPill" hidden>
                        <span id="versionValue">—</span>
                    </span>
                </div>
                <div class="status__host" id="statusHost">
                    <svg class="status__host-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="9"></circle>
                        <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"></path>
                    </svg>
                    <span id="hostValue">—</span>
                </div>
            </div>
        </main>

        <footer class="footer">
            <button id="refreshBtn" class="btn">
                <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 0 1 15.5-6.3L21 8" />
                    <path d="M21 3v5h-5" />
                    <path d="M21 12a9 9 0 0 1-15.5 6.3L3 16" />
                    <path d="M8 21H3v-5" />
                </svg>
                <span data-i18n="refresh"></span>
            </button>

            <a href="https://github.com/GallitoMZ/tailwind-detector" target="_blank" rel="noopener" class="oss-link"
                id="ossLink">
                <svg class="oss-link__icon" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.36-3.88-1.36-.53-1.34-1.29-1.69-1.29-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.19 1.18a11.1 11.1 0 0 1 5.81 0c2.22-1.49 3.19-1.18 3.19-1.18.63 1.59.23 2.77.11 3.06.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.41-5.27 5.7.42.36.79 1.06.79 2.14v3.17c0 .31.21.68.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z" />
                </svg>
                <span data-i18n="openSourceOnGitHub"></span>
            </a>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
